<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alore | Pieteikties</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Globālie stili - precīzi kā index.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f4f5f6;
            color: #111111;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Saglabā fona tīrību kā sākumlapā */
            -webkit-font-smoothing: antialiased;
        }

        /* PREMIUM ANIMĒTAIS UN BLURRY FONS */
        .background-container {
            position: fixed;
            top: -15%;
            left: -15%;
            width: 130%;
            height: 130%;
            z-index: 1;
            background: linear-gradient(135deg, #e4e7eb, #f1f3f5, #e9ecef, #f8f9fa, #dee2e6);
            background-size: 400% 400%;
            animation: premiumGradient 20s ease infinite;
            filter: blur(100px);
        }

        @keyframes premiumGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigācijas josla - identiska index.html */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 5rem;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #111111;
            text-transform: lowercase;
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        /* ATPAKAĻ POGA - dizains kā "Pieteikties" pogai index.html lapā */
        .back-btn {
            background-color: #111111;
            color: #ffffff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.7rem 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .back-btn:hover {
            background-color: #007bff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }

        /* CENTRĀLĀ FORMAS SADAĻA */
        .form-section {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.4); /* Maigāks, caurspīdīgāks ietvars */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 3.5rem;
            border-radius: 32px; /* Premium noapaļojums */
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.02);
            text-align: center;
            
            /* Gluda ielādes animācija */
            animation: formFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes formFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 2rem;
            color: #111111;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        input, textarea {
            width: 100%;
            padding: 1.1rem 1.2rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #111111;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus, textarea:focus {
            outline: none;
            background: #ffffff;
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* IESNIEGŠANAS POGA */
        .submit-btn {
            width: 100%;
            background-color: #111111;
            color: #ffffff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: #007bff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }

        .submit-btn:disabled {
            background-color: #868e96;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Kļūdas ziņojuma teksts, ja kaut kas noiet greizi ar internetu */
        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <!-- Navigācija precīzi kā index.html -->
    <nav class="navbar">
        <a href="index.html" class="logo">alore.</a>
        <div class="nav-right">
            <a href="index.html" class="back-btn">Atpakaļ</a>
        </div>
    </nav>

    <section class="form-section">
        <div class="form-container">
            <h2>Pieteikties</h2>
            
            <!-- FORMSPREE FORMA AR SMART JAVASCRIPT APSTRĀDI -->
            <form id="application-form" action="https://formspree.io/f/mzdlboja" method="POST">
                
                <div class="form-group">
                    <input type="text" name="name" required placeholder="Vārds / Uzņēmums">
                </div>
                
                <div class="form-group">
                    <input type="email" name="email" required placeholder="E-pasta adrese">
                </div>
                
                <div class="form-group">
                    <textarea name="message" rows="4" required placeholder="Jūsu ziņa..."></textarea>
                </div>
                
                <button type="submit" id="submit-btn" class="submit-btn">Nosūtīt</button>
                <div id="error-msg" class="error-message">Notika kļūda. Lūdzu, mēģiniet vēlreiz!</div>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('application-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Aptur standarta lapas pārlādi un pelēko Formspree logu
            
            const form = e.target;
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            // Vizuāli nosmeļam pogu sūtīšanas brīdī
            btn.disabled = true;
            btn.innerText = 'Nosūta...';
            errorMsg.style.display = 'none';
            
            // Nosūtam datus uz Formspree fonā (AJAX)
            fetch(form.action, {
                method: form.method,
                body: new FormData(form),
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // Ja viss kārtībā, uzreiz atveram mūsu skaisto dizainu
                    window.location.href = "paldies.html";
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            errorMsg.innerText = data.errors.map(error => error.message).join(", ");
                        } else {
                            errorMsg.innerText = "Notika kļūda nosūtot pieteikumu.";
                        }
                        errorMsg.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = 'Nosūtīt';
                    });
                }
            }).catch(error => {
                errorMsg.innerText = "Kļūda! Pārbaudiet interneta savienojumu.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Nosūtīt';
            });
        });
    </script>

</body>
</html>
